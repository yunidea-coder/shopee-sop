<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="智取店 SOP">
<meta name="theme-color" content="#3d2e28">
<title>智取店 SOP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f9f9f9;
  --surface: #ffffff;
  --surface-low: #f3f3f3;
  --on-surface: #1a1c1c;
  --on-surface-variant: #51443e;
  --primary: #744c34;
  --primary-container: #8f644a;
  --primary-fixed: #ffdbc8;
  --on-primary-fixed: #301402;
  --panel-dark: #3d2e28;
  --panel-text: #e8dcd1;
  --panel-text-dim: #a89485;
  --evening: #4a3a5e;
  --evening-fixed: #e0d4ee;
  --on-evening-fixed: #1f1530;
  --shadow-ambient: 0 18px 40px -5px rgba(81,68,62,.06);
  --shadow-card: 0 24px 60px -10px rgba(81,68,62,.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Inter', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--on-surface);
  min-height: 100vh;
  line-height: 1.5;
}
.header {
  background: linear-gradient(135deg, var(--panel-dark), #4a3830);
  color: var(--panel-text);
  padding: 28px 22px 26px;
  padding-top: calc(env(safe-area-inset-top, 0px) + 28px);
  box-shadow: var(--shadow-ambient);
}
.header .sub {
  font-family: 'Manrope', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--panel-text-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.header h1 {
  font-family: 'Manrope', 'Noto Sans TC', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.header .now {
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  color: var(--panel-text-dim);
  font-weight: 500;
}
.cards {
  padding: 24px 18px 20px;
  display: grid;
  gap: 16px;
}
.card {
  background: var(--surface);
  border-radius: 22px;
  padding: 24px 22px;
  box-shadow: var(--shadow-card);
  cursor: pointer;
  transition: transform .15s ease;
  display: block;
  text-decoration: none;
  color: inherit;
  position: relative;
  overflow: hidden;
}
.card:active { transform: scale(0.985); }
.card.morning::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(116,76,52,.05), transparent 60%);
  pointer-events: none;
}
.card.evening::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(74,58,94,.06), transparent 60%);
  pointer-events: none;
}
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
  position: relative;
  z-index: 1;
}
.card-emoji {
  font-size: 32px;
  line-height: 1;
}
.tag {
  display: inline-block;
  font-family: 'Manrope', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 5px 11px;
  border-radius: 999px;
  text-transform: uppercase;
}
.tag.now-tag {
  background: var(--primary-fixed);
  color: var(--on-primary-fixed);
}
.tag.now-tag.evening {
  background: var(--evening-fixed);
  color: var(--on-evening-fixed);
}
.card h2 {
  font-family: 'Manrope', 'Noto Sans TC', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
  position: relative;
  z-index: 1;
}
.card p {
  color: var(--on-surface-variant);
  font-size: 14px;
  line-height: 1.55;
  position: relative;
  z-index: 1;
}
.card-meta {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--surface-low);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Manrope', sans-serif;
  font-size: 12px;
  color: var(--on-surface-variant);
  position: relative;
  z-index: 1;
}
.card-meta .arrow {
  font-size: 18px;
  color: var(--primary);
  font-weight: 600;
}
.card.evening .card-meta .arrow { color: var(--evening); }
.foot {
  padding: 18px 22px 40px;
  text-align: center;
}
.foot a {
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  color: var(--on-surface-variant);
  text-decoration: none;
  font-weight: 600;
  letter-spacing: 0.02em;
  padding: 10px 16px;
  border-radius: 999px;
  background: var(--surface);
  display: inline-block;
  box-shadow: var(--shadow-ambient);
}
</style>
</head>
<body>
<div class="header">
  <div class="sub">智取店 · SOP</div>
  <h1>選擇班別</h1>
  <div class="now" id="now">--</div>
</div>

<div class="cards">
  <a class="card morning" href="morning/">
    <div class="card-top">
      <div class="card-emoji">🌅</div>
      <span class="tag now-tag" id="morningTag" style="display:none">建議：現在</span>
    </div>
    <h2>早班流程</h2>
    <p>進店巡迴 · 黑箱 · 進貨上架 · 逾期下架 · 收銀</p>
    <div class="card-meta">
      <span>多店輪迴</span>
      <span class="arrow">→</span>
    </div>
  </a>

  <a class="card evening" href="late/">
    <div class="card-top">
      <div class="card-emoji">🌙</div>
      <span class="tag now-tag evening" id="eveningTag" style="display:none">建議：現在</span>
    </div>
    <h2>晚班流程</h2>
    <p>NDD 打包 · 黑箱上架 · NDD 上架 · 包裹重新分配 · 一般包裹</p>
    <div class="card-meta">
      <span>跨店 (A 店 → B 店)</span>
      <span class="arrow">→</span>
    </div>
  </a>
</div>

<div class="foot">
  <a href="history/">📂 查看歷史紀錄</a>
</div>

<script>
const DAY = ['日','一','二','三','四','五','六'];
const now = new Date();
const h = now.getHours();
const m = now.getMinutes();
const dateStr = `${now.getMonth()+1}/${now.getDate()}（${DAY[now.getDay()]}）`;
const timeStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
document.getElementById('now').textContent = `${dateStr}  ·  ${timeStr}`;

// 7-13 點建議早班、16-23 點建議晚班
if (h >= 7 && h < 14) document.getElementById('morningTag').style.display = 'inline-block';
else if (h >= 16 && h < 24) document.getElementById('eveningTag').style.display = 'inline-block';
</script>
</body>
</html>
