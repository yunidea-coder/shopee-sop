<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="早班 SOP">
<meta name="theme-color" content="#3d2e28">
<title>智取店 早班 SOP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f9f9f9;
  --surface: #ffffff;
  --surface-low: #f3f3f3;
  --surface-high: #e8e8e8;
  --on-surface: #1a1c1c;
  --on-surface-variant: #51443e;
  --primary: #744c34;
  --primary-container: #8f644a;
  --primary-fixed: #ffdbc8;
  --on-primary-fixed: #301402;
  --tertiary: #a71d15;
  --outline-variant: #d5c3ba;
  --panel-dark: #3d2e28;
  --panel-text: #e8dcd1;
  --panel-text-dim: #a89485;
  --ok: #5b7a5e;
  --ok-bg: #eef2ec;
  --warn: #b8692a;
  --warn-bg: #fbf1e6;
  --danger: #a71d15;
  --danger-bg: #f9ebe9;
  --cond: #6b5b4f;
  --cond-bg: #efeae4;
  --shadow-ambient: 0 18px 40px -5px rgba(81,68,62,.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Inter', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--on-surface);
  min-height: 100vh;
  padding-bottom: 100px;
  line-height: 1.5;
}

.header {
  background: linear-gradient(135deg, var(--panel-dark), #4a3830);
  color: var(--panel-text);
  padding: 22px 20px 18px;
  padding-top: calc(env(safe-area-inset-top, 0px) + 22px);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-ambient);
}
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}
.header .sub {
  font-family: 'Manrope', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--panel-text-dim);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.header h1 {
  font-family: 'Manrope', 'Noto Sans TC', sans-serif;
  font-size: 19px;
  font-weight: 800;
  letter-spacing: -0.01em;
}
.date-box {
  text-align: right;
  font-family: 'Manrope', sans-serif;
}
.date-num {
  font-size: 22px;
  font-weight: 800;
  color: var(--panel-text);
  line-height: 1;
  margin-bottom: 6px;
}
.day-tag {
  display: inline-block;
  background: rgba(255,255,255,.12);
  border-radius: 999px;
  padding: 2px 10px;
  font-size: 11px;
  font-weight: 700;
  color: var(--panel-text);
  letter-spacing: 0.05em;
}
.prog-wrap {
  background: rgba(255,255,255,.1);
  border-radius: 10px;
  height: 6px;
  overflow: hidden;
}
.prog-bar {
  height: 100%;
  background: var(--primary-fixed);
  border-radius: 10px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
  width: 0;
}
.prog-label {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  color: var(--panel-text-dim);
  text-align: right;
  margin-top: 6px;
  letter-spacing: 0.05em;
}

#setupScreen {
  margin: 28px 16px;
  background: var(--surface);
  border-radius: 20px;
  padding: 32px 24px;
  box-shadow: var(--shadow-ambient);
}
#setupScreen h2 {
  font-family: 'Manrope', 'Noto Sans TC', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--on-surface);
  margin-bottom: 6px;
  text-align: center;
  letter-spacing: -0.01em;
}
#setupScreen > p {
  font-size: 13px;
  color: var(--on-surface-variant);
  margin-bottom: 28px;
  text-align: center;
}
.store-picker {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-bottom: 32px;
}
.store-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: var(--surface-low);
  color: var(--primary);
  font-size: 22px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
.store-btn:active { background: var(--primary-fixed); }
#storeCount {
  font-family: 'Manrope', sans-serif;
  font-size: 44px;
  font-weight: 800;
  color: var(--primary);
  min-width: 58px;
  text-align: center;
  letter-spacing: -0.02em;
}
.store-unit {
  font-size: 13px;
  color: var(--on-surface-variant);
  margin-left: 2px;
}
.name-section { margin-bottom: 28px; }
.name-section-title {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--on-surface-variant);
  letter-spacing: 0.05em;
  text-align: center;
  margin-bottom: 14px;
  text-transform: uppercase;
}
.name-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.name-label {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--on-surface-variant);
  min-width: 40px;
  flex-shrink: 0;
  text-align: right;
  letter-spacing: 0.02em;
}
.name-input {
  flex: 1;
  padding: 11px 14px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  color: var(--on-surface);
  -webkit-appearance: none;
  outline: none;
  background: var(--surface-low);
  font-family: inherit;
  transition: background .2s;
}
.name-input:focus { background: var(--surface); box-shadow: inset 0 -2px 0 var(--primary); }
.name-input::placeholder { color: var(--outline-variant); }
.start-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary), var(--primary-container));
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  letter-spacing: 0.08em;
  font-family: 'Manrope', 'Noto Sans TC', sans-serif;
  box-shadow: 0 10px 28px -8px rgba(116,76,52,.4);
}
.start-btn:active { opacity: .9; }

.phase-header {
  margin: 24px 16px 14px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.phase-pill {
  padding: 6px 14px;
  border-radius: 999px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
  white-space: nowrap;
  text-transform: uppercase;
}
.phase-pill.ph1 { background: var(--primary-fixed); color: var(--on-primary-fixed); }
.phase-pill.ph2 { background: var(--panel-dark); color: var(--panel-text); }
.phase-desc {
  font-size: 11px;
  color: var(--on-surface-variant);
  flex: 1;
  text-align: right;
  letter-spacing: 0.02em;
}

.store-block {
  margin: 0 16px 14px;
  background: var(--surface);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: var(--shadow-ambient);
}
.store-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  cursor: pointer;
  gap: 10px;
}
.store-title-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
}
.store-num {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--primary-fixed);
  color: var(--on-primary-fixed);
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.store-num.dark { background: var(--panel-dark); color: var(--panel-text); }
.store-name-text {
  font-size: 14px;
  font-weight: 700;
  color: var(--on-surface);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.store-title-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.store-prog {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  color: var(--on-surface-variant);
  letter-spacing: 0.02em;
}
.store-arrow {
  font-size: 10px;
  color: var(--on-surface-variant);
  transition: transform .2s;
}
.store-block.collapsed .store-arrow { transform: rotate(-90deg); }
.store-tasks { overflow: hidden; transition: max-height .3s ease; }
.store-block.collapsed .store-tasks { max-height: 0 !important; }

.copy-name-btn {
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--primary-fixed);
  color: var(--on-primary-fixed);
  font-size: 10px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
  letter-spacing: 0.02em;
}
.copy-name-btn:active { opacity: .8; }

.task {
  background: var(--surface);
  padding: 14px 18px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
  position: relative;
}
.task + .task { margin-top: 2px; }
.task::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 3px;
  border-radius: 0 3px 3px 0;
  background: transparent;
}
.task.priority { background: linear-gradient(90deg, rgba(167,29,21,.04), transparent 60%); }
.task.priority::before { background: var(--danger); }
.task.hi { background: linear-gradient(90deg, rgba(184,105,42,.07), transparent 60%); }
.task.hi::before { background: var(--warn); }
.task.time12::before { background: var(--warn); }
.task.clock-in::before { background: var(--ok); }
.task.clock-out::before { background: var(--danger); }
.task.cond { opacity: .82; }
.task.cond::before { background: var(--cond); }
.task.must::before { background: var(--outline-variant); }
.task.done { background: var(--ok-bg); }
.task.done::before { background: var(--ok); }
.task.done .task-name { color: var(--on-surface-variant); text-decoration: line-through; text-decoration-color: rgba(81,68,62,.4); }
.task.done .task-desc, .task.done .note { opacity: .5; }
.cb {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--surface-high);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .22s;
  margin-top: 1px;
}
.task.done .cb { background: var(--ok); }
.ck {
  color: #fff;
  font-size: 13px;
  opacity: 0;
  transform: scale(0);
  transition: all .2s;
  font-weight: 700;
}
.task.done .ck { opacity: 1; transform: scale(1); }
.tc { flex: 1; min-width: 0; }
.task-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--on-surface);
  line-height: 1.4;
}
.task-desc {
  font-size: 12px;
  color: var(--on-surface-variant);
  margin-top: 4px;
  line-height: 1.5;
}
.note {
  font-size: 11px;
  color: var(--warn);
  margin-top: 6px;
  background: var(--warn-bg);
  border-radius: 8px;
  padding: 6px 10px;
  line-height: 1.5;
}
.note.purple { color: var(--cond); background: var(--cond-bg); }
.badges {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 7px;
}
.badge {
  font-family: 'Manrope', sans-serif;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 999px;
  letter-spacing: 0.03em;
  background: var(--surface-low);
  color: var(--on-surface-variant);
}
.badge.bp { background: #e8e0d8; color: #5a4033; }
.badge.bt { background: var(--warn-bg); color: var(--warn); }
.badge.bl { background: var(--ok-bg); color: var(--ok); }
.badge.bo { background: var(--cond-bg); color: var(--cond); }
.badge.by { background: #fff3dc; color: #8c5a1d; }
.badge.bg { background: var(--ok-bg); color: var(--ok); }
.badge.br { background: var(--danger-bg); color: var(--danger); }

.wh-options {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.wh-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--warn-bg);
  border-radius: 10px;
  padding: 9px 12px;
  gap: 10px;
}
.wh-text {
  font-size: 12px;
  color: var(--warn);
  font-weight: 600;
  flex: 1;
  line-height: 1.4;
  word-break: break-all;
}
.wh-copy-btn {
  padding: 5px 12px;
  border-radius: 999px;
  background: #fff;
  color: var(--warn);
  font-size: 11px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  font-family: inherit;
}
.wh-copy-btn:active { opacity: .8; }

.transition-note {
  margin: 4px 16px 14px;
  padding: 14px 18px;
  background: var(--primary-fixed);
  border-radius: 14px;
  font-size: 12px;
  color: var(--on-primary-fixed);
  line-height: 1.6;
}
.transition-note b { font-weight: 800; }

.data-section {
  background: var(--surface-low);
  padding: 14px 18px;
}
.data-section-title {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 0.05em;
  margin-bottom: 12px;
  text-transform: uppercase;
}
.data-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.data-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border-radius: 12px;
  padding: 9px 12px;
}
.data-label {
  font-size: 12px;
  color: var(--on-surface-variant);
  font-weight: 600;
}
.num-ctrl { display: flex; align-items: center; gap: 6px; }
.num-btn {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: none;
  background: var(--surface-low);
  color: var(--primary);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.num-btn:active { background: var(--primary-fixed); }
.num-val {
  font-family: 'Manrope', sans-serif;
  font-size: 15px;
  font-weight: 800;
  color: var(--primary);
  min-width: 24px;
  text-align: center;
}

.summary-section {
  margin: 16px 16px 20px;
  background: var(--surface);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: var(--shadow-ambient);
}
.summary-header {
  background: var(--panel-dark);
  color: var(--panel-text);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.summary-header h3 {
  font-family: 'Manrope', 'Noto Sans TC', sans-serif;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.02em;
}
.copy-btn {
  padding: 7px 16px;
  background: rgba(255,255,255,.12);
  border: none;
  color: var(--panel-text);
  font-size: 11px;
  font-weight: 700;
  border-radius: 999px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.05em;
}
.copy-btn:active { background: rgba(255,255,255,.25); }
.summary-store { padding: 14px 20px; }
.summary-store + .summary-store { background: var(--surface-low); }
.summary-store + .summary-store + .summary-store { background: var(--surface); }
.summary-store-name {
  font-family: 'Manrope', 'Noto Sans TC', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--on-surface);
  margin-bottom: 8px;
}
.summary-fields {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px 10px;
}
.sf {
  font-size: 11px;
  color: var(--on-surface-variant);
}
.sf b {
  color: var(--primary);
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
}
.summary-total {
  background: var(--primary-fixed);
  padding: 14px 20px;
}
.summary-total-title {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 800;
  color: var(--on-primary-fixed);
  letter-spacing: 0.05em;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.summary-total .sf { color: var(--on-primary-fixed); }
.summary-total .sf b { color: var(--on-primary-fixed); }

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--panel-dark);
  color: var(--panel-text);
  padding: 11px 22px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
  z-index: 9999;
  white-space: nowrap;
  box-shadow: 0 20px 40px -8px rgba(0,0,0,.3);
}
.toast.show { opacity: 1; }

.done-banner {
  display: none;
  margin: 18px 16px 0;
  background: linear-gradient(135deg, var(--ok), #6f8e71);
  color: #fff;
  border-radius: 18px;
  padding: 24px;
  text-align: center;
  box-shadow: 0 18px 40px -8px rgba(91,122,94,.35);
}
.done-banner.show { display: block; }
.done-banner .em { font-size: 38px; margin-bottom: 8px; }
.done-banner h2 {
  font-family: 'Manrope', 'Noto Sans TC', sans-serif;
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 4px;
}
.done-banner p { font-size: 12px; opacity: .9; }

.bottom-btns {
  display: flex;
  gap: 10px;
  margin: 24px 16px 0;
}
.ghost-btn {
  flex: 1;
  background: var(--surface-low);
  border: none;
  color: var(--on-surface-variant);
  font-size: 12px;
  font-weight: 700;
  padding: 12px 0;
  border-radius: 999px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.05em;
}
.ghost-btn:active { background: var(--surface-high); }
.ghost-btn.danger { color: var(--tertiary); }
</style>
</head>
<body>
<div class="header">
  <div class="header-row">
    <div>
      <div class="sub">智取店 · 早班</div>
      <h1>每日 SOP 清單</h1>
    </div>
    <div class="date-box">
      <div class="date-num" id="dateStr">--</div>
      <div class="day-tag" id="dayTag">--</div>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="pb"></div></div>
  <div class="prog-label" id="pl">0 / 0 完成</div>
</div>

<div id="setupScreen">
  <h2>今天跑幾間店？</h2>
  <p>輸入店數與店名，避免跑錯店</p>
  <div class="store-picker">
    <button class="store-btn" onclick="changeCount(-1)">−</button>
    <div><span id="storeCount">5</span><span class="store-unit">間</span></div>
    <button class="store-btn" onclick="changeCount(1)">+</button>
  </div>
  <div class="name-section">
    <div class="name-section-title">店名設定（強烈建議填寫）</div>
    <div id="nameInputs"></div>
  </div>
  <button class="start-btn" onclick="startChecklist()">開始今日任務 →</button>
</div>

<div id="checklistArea" style="display:none">
  <div class="done-banner" id="doneBanner">
    <div class="em">🎉</div>
    <h2>今日所有店完成！</h2>
    <p>辛苦了，早班全部 SOP 已執行完畢</p>
  </div>
  <div id="phaseContent"></div>
  <div class="bottom-btns">
    <button class="ghost-btn" onclick="goBack()">← 重新設定</button>
    <button class="ghost-btn danger" onclick="resetAll()">重置今日清單</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DAY = ['日','一','二','三','四','五','六'];
const today = new Date();
const dow = today.getDay();
const dateKey = today.toDateString();
document.getElementById('dateStr').textContent = `${today.getMonth()+1}/${today.getDate()}`;
document.getElementById('dayTag').textContent = `星期${DAY[dow]}`;

let totalCount = parseInt(localStorage.getItem('count_'+dateKey) || '5');
document.getElementById('storeCount').textContent = totalCount;

const P1_FIELDS = [{key:'bx', label:'黑箱'}];
const P2_FIELDS = [
  {key:'norm', label:'一般進店'},
  {key:'ndd', label:'NDD進店'}
];
const ALL_FIELDS = [...P1_FIELDS, ...P2_FIELDS];

function loadNames(){ try { return JSON.parse(localStorage.getItem('names_'+dateKey) || '[]'); } catch(e) { return []; } }
function saveNames(n){ try { localStorage.setItem('names_'+dateKey, JSON.stringify(n)); } catch(e) {} }
function saveCurrentNames(){
  const names = [];
  for (let j = 1; j <= totalCount; j++) {
    const el = document.getElementById('ni_'+j);
    names[j-1] = el ? el.value : '';
  }
  saveNames(names);
}
function renderNameInputs(){
  const saved = loadNames();
  const c = document.getElementById('nameInputs');
  c.innerHTML = '';
  for (let i = 1; i <= totalCount; i++) {
    const v = saved[i-1] || '';
    const r = document.createElement('div');
    r.className = 'name-row';
    const lbl = document.createElement('span');
    lbl.className = 'name-label';
    lbl.textContent = '第'+i+'間';
    const inp = document.createElement('input');
    inp.className = 'name-input';
    inp.id = 'ni_'+i;
    inp.type = 'text';
    inp.value = v;
    inp.placeholder = '例：桃園南崁店';
    inp.addEventListener('input', saveCurrentNames);
    r.appendChild(lbl);
    r.appendChild(inp);
    c.appendChild(r);
  }
}
function changeCount(d){
  saveCurrentNames();
  totalCount = Math.max(1, Math.min(10, totalCount + d));
  document.getElementById('storeCount').textContent = totalCount;
  renderNameInputs();
}
renderNameInputs();

function loadData(){ try { return JSON.parse(localStorage.getItem('sopdata_'+dateKey) || '{}'); } catch(e) { return {}; } }
function saveData(d){ try { localStorage.setItem('sopdata_'+dateKey, JSON.stringify(d)); } catch(e) {} }
function updateNum(sid, key, delta){
  const d = loadData();
  if (!d[sid]) d[sid] = {};
  d[sid][key] = Math.max(0, (d[sid][key] || 0) + delta);
  saveData(d);
  const el = document.getElementById(`nv_${sid}_${key}`);
  if (el) el.textContent = d[sid][key];
  refreshSummary();
}

function normalTasks(s){
  const isTue = dow === 2, isSweep = [2,4,5].includes(dow), isMop = dow === 4;
  const tasks = [
    {id:`s${s}_m2`, cls:'cond', name:'紙捲測試回報', desc:'', badges:[{c:'bp',t:'📷 拍照'},{c:'bl',t:'Line回報'}]},
    {id:`s${s}_p1`, cls:'must', name:'逾期包裹下架 + 離店裝箱', desc:'查詢逾期件並完成裝箱', badges:[{c:'bp',t:'📷 拍照'},{c:'bl',t:'Line 逾期回報'}]},
    {id:`s${s}_p2`, cls:'must', name:'進貨包裹驗收上架', desc:'核對包裹後放入格子', badges:[{c:'bp',t:'📷 拍照'}]},
  ];
  if (isTue) tasks.push({id:`s${s}_p3`, cls:'must', name:'包裹盤點', desc:'清點所有格子包裹', badges:[{c:'bp',t:'📷 拍照'},{c:'bo',t:'📅 週二限定'},{c:'bl',t:'Line 盤點回報'}]});
  tasks.push(
    {id:`s${s}_p4`, cls:'cond', name:'異常包裹離店裝箱（視情況）', desc:'記錄並裝箱異常包裹', note:'有異常包裹時才做', noteCls:'purple', badges:[{c:'bp',t:'📷 拍照'},{c:'bl',t:'Line 異常包裹'}]},
    {id:`s${s}_p5`, cls:'must', name:'寄件包裹離店裝箱', desc:'完成寄件包裹裝箱離店', noteText:'⚠️ 若收到寄件欄已滿通知，須依由上而下順序完成！', badges:[{c:'bp',t:'📷 拍照'},{c:'bl',t:'Line 寄件清空'}]},
    {id:`s${s}_sys`, cls:'hi', name:'⭐ 檢查 AMS 系統並完成入庫', desc:'確認系統狀態，完成所有包裹入庫', note:'維修申請耗材驗收', noteCls:'purple', badges:[{c:'by',t:'重點項目'},{c:'bp',t:'📷 截圖'}]},
    {id:`s${s}_l1`, cls:'time12', name:'1200前 SCSHD 上架', desc:'', badges:[{c:'bt',t:'⏰ 12:00前'},{c:'bp',t:'📷 拍照'},{c:'bl',t:'Line回報'}]},
    {id:`s${s}_l5`, cls:'must', name:'滯留包裹回傳', desc:'', badges:[{c:'bp',t:'📷 拍照'},{c:'bl',t:'Line回報'}]},
    {id:`s${s}_l7`, cls:'must', name:'寄件清空回報', desc:'', badges:[{c:'bp',t:'📷 拍照'},{c:'bl',t:'Line回報'}]},
    {id:`s${s}_l8`, cls:'must', name:'PDA 充電回傳', desc:'', badges:[{c:'bp',t:'📷 拍照'},{c:'bl',t:'Line回報'}]},
    {id:`s${s}_l9`, cls:'must', name:'包裹清 0', desc:'', badges:[{c:'bp',t:'📷 拍照'},{c:'bl',t:'Line回報'}]},
    {id:`s${s}_l10`, cls:'must', name:'包裹重新上架回報', desc:'', badges:[{c:'bp',t:'📷 拍照'},{c:'bl',t:'Line回報'}]},
    {id:`s${s}_l11`, cls:'must', name:'遺落回報', desc:'', badges:[{c:'bp',t:'📷 拍照'},{c:'bl',t:'Line回報'}]},
    {id:`s${s}_l12`, cls:'must', name:'鑰匙回放', desc:'', badges:[{c:'bl',t:'Line回報'}]},
    {id:`s${s}_l13`, cls:'cond', name:'其他異常詢問回報（視情況）', desc:'', note:'有異常才需回報', noteCls:'purple', badges:[{c:'bl',t:'Line回報'}]},
    {id:`s${s}_l14`, cls:'cond', name:'客訴處理（視情況）', desc:'', note:'有客訴才需回報', noteCls:'purple', badges:[{c:'bl',t:'Line回報'}]},
    {id:`s${s}_c1`, cls:'must', name:'每日清掃 & 循環包裝', desc:'倒垃圾 → 清空收據紙筒 → 循環包裝整理與離店裝箱 → 淨空前場 → 設備歸位 → 廣除TO箱單 → PDA充電', badges:[]}
  );
  if (isSweep) tasks.push({id:`s${s}_c2`, cls:'must', name:`掃地（${dow===2?'週二':dow===4?'週四':'週五'}）`, desc:'約 3 分鐘，僅需撿起大型垃圾', badges:[{c:'bo',t:'📅 今日限定'}]});
  if (isMop) tasks.push({id:`s${s}_c3`, cls:'must', name:'拖地（週四）', desc:'約 5 分鐘，僅需將明顯髒污清除', badges:[{c:'bo',t:'📅 今日限定'}]});
  return tasks;
}

function taskHtml(task, sid){
  const nh = task.note ? `<div class="note ${task.noteCls||''}">${task.note}</div>` : (task.noteText ? `<div class="note">${task.noteText}</div>` : '');
  const bh = task.badges && task.badges.length ? `<div class="badges">${task.badges.map(b=>`<span class="badge ${b.c}">${b.t}</span>`).join('')}</div>` : '';
  return `<div class="task ${task.cls}" id="${task.id}" onclick="tap('${task.id}','${sid}')"><div class="cb"><span class="ck">✓</span></div><div class="tc"><div class="task-name">${task.name}</div>${task.desc?`<div class="task-desc">${task.desc}</div>`:''}${nh}${bh}</div></div>`;
}
function bxTaskHtml(sid, name){
  const naText = `${name} WH未到店`, okText = `${name} WH上架完成`;
  return `<div class="task priority" id="${sid}_bx" onclick="tap('${sid}_bx','${sid}')"><div class="cb"><span class="ck">✓</span></div><div class="tc"><div class="task-name">⚡ 1200前 黑箱上架</div><div class="task-desc">完成後選擇狀況，複製文字貼到 Line 群組</div><div class="badges"><span class="badge bt">⏰ 12:00前</span><span class="badge bl">📋 Line 回報</span></div><div class="wh-options"><div class="wh-option"><span class="wh-text">${naText}</span><button class="wh-copy-btn" onclick="copyWH(event,'${naText.replace(/'/g,"\\'")}')">複製</button></div><div class="wh-option"><span class="wh-text">${okText}</span><button class="wh-copy-btn" onclick="copyWH(event,'${okText.replace(/'/g,"\\'")}')">複製</button></div></div></div></div>`;
}
function dataSectionHtml(sid, fields, title){
  const vals = (loadData()[sid]) || {};
  const rows = fields.map(f=>`<div class="data-row"><span class="data-label">${f.label}</span><div class="num-ctrl"><button class="num-btn" onclick="updateNum('${sid}','${f.key}',-1);event.stopPropagation()">−</button><span class="num-val" id="nv_${sid}_${f.key}">${vals[f.key]||0}</span><button class="num-btn" onclick="updateNum('${sid}','${f.key}',1);event.stopPropagation()">+</button></div></div>`).join('');
  return `<div class="data-section"><div class="data-section-title">${title}</div><div class="data-grid">${rows}</div></div>`;
}
function storeBlockHtml(blockId, numLabel, color, title, tasksHtml, storeName){
  const cb = storeName ? `<button class="copy-name-btn" onclick="copyName(event,'${storeName.replace(/'/g,"\\'")}')">複製店名</button>` : '';
  return `<div class="store-block" id="blk_${blockId}"><div class="store-title" onclick="toggleBlock('blk_${blockId}')"><div class="store-title-left"><div class="store-num ${color}">${numLabel}</div><div class="store-name-text">${title}</div></div><div class="store-title-right">${cb}<div class="store-prog" id="prog_${blockId}"></div><div class="store-arrow">▼</div></div></div><div class="store-tasks" id="tasks_${blockId}">${tasksHtml}</div></div>`;
}
function valsForStore(d, i){
  const merged = {};
  P1_FIELDS.forEach(f => { merged[f.key] = (d[`p1_s${i}`] || {})[f.key] || 0; });
  P2_FIELDS.forEach(f => { merged[f.key] = (d[`p2_s${i}`] || {})[f.key] || 0; });
  return merged;
}
function fieldSourceSid(i, key){
  return P1_FIELDS.some(f => f.key === key) ? `p1_s${i}` : `p2_s${i}`;
}
function buildSummaryHtml(){
  const d = loadData();
  const totals = {}; ALL_FIELDS.forEach(f => totals[f.key] = 0);
  let sh = '';
  for (let i = storeCount; i >= 1; i--) {
    const name = storeNames[i-1] || `第${i}間店`, vals = valsForStore(d, i), order = storeCount - i + 1;
    ALL_FIELDS.forEach(f => totals[f.key] += vals[f.key]);
    sh += `<div class="summary-store"><div class="summary-store-name">第${order}站 · ${name}</div><div class="summary-fields">${ALL_FIELDS.map(f=>`<div class="sf">${f.label}：<b id="ss_${fieldSourceSid(i,f.key)}_${f.key}">${vals[f.key]}</b></div>`).join('')}</div></div>`;
  }
  const th = `<div class="summary-total"><div class="summary-total-title">📦 今日合計</div><div class="summary-fields">${ALL_FIELDS.map(f=>`<div class="sf">${f.label}：<b id="st_${f.key}">${totals[f.key]}</b></div>`).join('')}</div></div>`;
  return `<div class="summary-section"><div class="summary-header"><h3>📋 離店統整摘要</h3><button class="copy-btn" onclick="copySummary()">複製摘要</button></div>${sh}${th}</div>`;
}
function refreshSummary(){
  const d = loadData(), totals = {};
  ALL_FIELDS.forEach(f => totals[f.key] = 0);
  for (let i = storeCount; i >= 1; i--) {
    const vals = valsForStore(d, i);
    ALL_FIELDS.forEach(f => {
      totals[f.key] += vals[f.key];
      const el = document.getElementById(`ss_${fieldSourceSid(i,f.key)}_${f.key}`);
      if (el) el.textContent = vals[f.key];
    });
  }
  ALL_FIELDS.forEach(f => {
    const el = document.getElementById(`st_${f.key}`);
    if (el) el.textContent = totals[f.key];
  });
}

let allTaskIds = [], storeCount = 0, storeNames = [];

function startChecklist(){
  storeCount = totalCount;
  localStorage.setItem('count_'+dateKey, storeCount);
  const savedNames = loadNames();
  storeNames = [];
  for (let i = 1; i <= storeCount; i++) {
    const inp = document.getElementById(`ni_${i}`);
    storeNames.push((inp && inp.value.trim()) || savedNames[i-1] || `第${i}間店`);
  }
  saveNames(storeNames);

  const saved = loadAll();
  let html = '';
  allTaskIds = [];

  html += `<div class="phase-header"><div class="phase-pill ph1">Phase 1</div><div class="phase-desc">黑箱上架巡迴（共 ${storeCount} 間）</div></div>`;
  for (let i = 1; i <= storeCount; i++) {
    const isLast = i === storeCount, sid = `p1_s${i}`, name = storeNames[i-1];
    const ids = [`${sid}_in`, `${sid}_bx`];
    if (!isLast) ids.push(`${sid}_out`);
    allTaskIds.push(...ids);
    let th = '';
    th += taskHtml({id:`${sid}_in`, cls:'clock-in', name:'進店打卡', desc:'掃描 QR Code 完成 TO 單打卡', badges:[{c:'bp',t:'📷 拍照存證'},{c:'bg',t:'✅ 進店'}]}, sid);
    th += dataSectionHtml(sid, P1_FIELDS, '📊 黑箱數量記錄');
    th += bxTaskHtml(sid, name);
    if (!isLast) th += taskHtml({id:`${sid}_out`, cls:'clock-out', name:'離店打卡', desc:'前往下一間店', badges:[{c:'bp',t:'📷 拍照存證'},{c:'br',t:'🚪 離店'}]}, sid);
    html += storeBlockHtml(sid, isLast ? `${i}★` : `${i}`, '', isLast ? `${name}　← 最後一間，接正常流程` : name, th, name);
  }
  html += `<div class="transition-note">🔄 <b>黑箱巡迴結束</b>，從第 ${storeCount} 間店開始，依序往回執行正常流程</div>`;
  html += `<div class="phase-header"><div class="phase-pill ph2">Phase 2</div><div class="phase-desc">正常流程（從第 ${storeCount} 間往回）</div></div>`;
  for (let i = storeCount; i >= 1; i--) {
    const isFirst = i === storeCount, sid = `p2_s${i}`, name = storeNames[i-1], nTasks = normalTasks(sid);
    const ids = [];
    if (!isFirst) ids.push(`${sid}_in`);
    ids.push(...nTasks.map(t => t.id));
    ids.push(`${sid}_out`);
    allTaskIds.push(...ids);
    let th = '';
    if (!isFirst) th += taskHtml({id:`${sid}_in`, cls:'clock-in', name:'進店打卡', desc:'掃描 QR Code', badges:[{c:'bp',t:'📷 拍照存證'},{c:'bg',t:'✅ 進店'}]}, sid);
    th += dataSectionHtml(sid, P2_FIELDS, '📊 數量記錄（進店後填寫）');
    nTasks.forEach(t => { th += taskHtml(t, sid); });
    th += taskHtml({id:`${sid}_out`, cls:'clock-out', name:'離店打卡', desc:'掃描 QR Code 完成離店打卡', badges:[{c:'bp',t:'📷 拍照存證'},{c:'br',t:'🚪 離店'}]}, sid);
    html += storeBlockHtml(sid, `${storeCount-i+1}`, 'dark', isFirst ? `${name}（續正常流程）` : name, th, name);
  }
  html += buildSummaryHtml();

  document.getElementById('phaseContent').innerHTML = html;
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('checklistArea').style.display = 'block';

  allTaskIds.forEach(id => {
    const el = document.getElementById(id);
    if (el && saved[id]) el.classList.add('done');
  });
  document.querySelectorAll('.store-block').forEach(blk => {
    const inner = blk.querySelector('.store-tasks');
    inner.style.maxHeight = inner.scrollHeight + 'px';
  });
  updateAllProgress();
}

function copyName(e, name){
  e.stopPropagation();
  navigator.clipboard.writeText(name).then(() => showToast(`已複製「${name}」✓`)).catch(() => showToast('複製失敗'));
}
function copyWH(e, text){
  e.stopPropagation();
  navigator.clipboard.writeText(text).then(() => showToast(`已複製「${text}」✓`)).catch(() => showToast('複製失敗'));
}
function copySummary(){
  const d = loadData(), ds = `${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;
  let txt = `=== ${ds} 早班數量統整 ===\n\n`;
  const totals = {}; ALL_FIELDS.forEach(f => totals[f.key] = 0);
  for (let i = storeCount; i >= 1; i--) {
    const name = storeNames[i-1] || `第${i}間店`, order = storeCount - i + 1, vals = valsForStore(d, i);
    txt += `【第${order}站 · ${name}】\n`;
    ALL_FIELDS.forEach(f => { txt += `  ${f.label}：${vals[f.key]}箱\n`; totals[f.key] += vals[f.key]; });
    txt += '\n';
  }
  txt += `【今日合計】\n`;
  ALL_FIELDS.forEach(f => { txt += `  ${f.label}：${totals[f.key]}箱\n`; });
  navigator.clipboard.writeText(txt).then(() => showToast('已複製摘要 ✓')).catch(() => showToast('複製失敗'));
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function toggleBlock(blockId){
  const blk = document.getElementById(blockId), inner = blk.querySelector('.store-tasks');
  if (blk.classList.contains('collapsed')) {
    blk.classList.remove('collapsed');
    inner.style.maxHeight = inner.scrollHeight + 'px';
  } else {
    blk.classList.add('collapsed');
  }
}
function loadAll(){ try { return JSON.parse(localStorage.getItem('sop4_'+dateKey) || '{}'); } catch(e) { return {}; } }
function saveAll(s){ try { localStorage.setItem('sop4_'+dateKey, JSON.stringify(s)); } catch(e) {} }
function tap(id, sid){
  const el = document.getElementById(id), s = loadAll();
  s[id] = !s[id];
  saveAll(s);
  el.classList.toggle('done', s[id]);
  updateAllProgress();
  const blk = el.closest('.store-block');
  if (blk && !blk.classList.contains('collapsed')) {
    const inner = blk.querySelector('.store-tasks');
    inner.style.maxHeight = inner.scrollHeight + 'px';
  }
}
function updateAllProgress(){
  const s = loadAll(), done = allTaskIds.filter(id => s[id]).length, total = allTaskIds.length;
  document.getElementById('pb').style.width = total ? Math.round(done / total * 100) + '%' : '0%';
  document.getElementById('pl').textContent = `${done} / ${total} 完成`;
  document.getElementById('doneBanner').classList.toggle('show', done === total && total > 0);
  document.querySelectorAll('.store-block').forEach(blk => {
    const tasks = blk.querySelectorAll('.task'), bDone = [...tasks].filter(t => t.classList.contains('done')).length, bTotal = tasks.length;
    const prog = document.getElementById('prog_'+blk.id.replace('blk_',''));
    if (prog) {
      prog.textContent = bDone === bTotal ? '✓ 完成' : `${bDone}/${bTotal}`;
      prog.style.color = bDone === bTotal ? 'var(--ok)' : 'var(--on-surface-variant)';
    }
    if (bDone === bTotal && bTotal > 0 && !blk.classList.contains('collapsed')) toggleBlock(blk.id.replace('blk_',''));
  });
}
function goBack(){
  localStorage.removeItem('count_'+dateKey);
  document.getElementById('checklistArea').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'block';
  renderNameInputs();
}
function resetAll(){
  if (!confirm('確定重置今日清單？')) return;
  saveAll({});
  allTaskIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('done');
  });
  document.querySelectorAll('.store-block').forEach(blk => {
    blk.classList.remove('collapsed');
    const inner = blk.querySelector('.store-tasks');
    inner.style.maxHeight = inner.scrollHeight + 'px';
  });
  updateAllProgress();
}
if (localStorage.getItem('count_'+dateKey)) {
  storeNames = loadNames();
  startChecklist();
}
</script>
